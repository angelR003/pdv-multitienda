<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Ajustes - Las Gardenias</title>


  <link rel="icon" type="image/png" href="./assets/gardenia.png">
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="bg-zinc-950 text-white min-h-screen">

  <main class="max-w-6xl mx-auto p-6">

    <header class="flex items-center gap-4 mb-8">

      <a
        href="./dashboard.html"
        class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-sm"
      >
        ← Menú
      </a>

      <div>
        <h1 class="text-4xl font-black">
          Ajustes de inventario
        </h1>

        <p class="text-zinc-400 mt-2">
          Correcciones manuales de existencias.
        </p>
      </div>

    </header>

    <section class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 mb-8">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <div>
          <label class="block text-sm text-zinc-400 mb-2">
            Producto
          </label>

          <select
            id="producto"
            class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
          ></select>
        </div>

        <div>
          <label class="block text-sm text-zinc-400 mb-2">
            Nueva cantidad
          </label>

          <input
            id="cantidadNueva"
            type="number"
            step="0.001"
            class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
            placeholder="Nueva cantidad..."
          />
        </div>

      </div>

      <div class="mt-5">
        <label class="block text-sm text-zinc-400 mb-2">
          Motivo
        </label>

        <input
          id="motivo"
          type="text"
          class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
          placeholder="Ejemplo: Producto roto"
        />
      </div>

      <div class="mt-5">
        <label class="block text-sm text-zinc-400 mb-2">
          Observaciones
        </label>

        <textarea
          id="observaciones"
          rows="4"
          class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
          placeholder="Observaciones..."
        ></textarea>
      </div>

      <button
        type="button"
        id="btnAjustar"
        class="mt-8 w-full bg-orange-500 hover:bg-orange-400 text-black font-black py-4 rounded-xl text-xl"
      >
        Realizar ajuste
      </button>

      <p
        id="mensaje"
        class="mt-5 text-sm text-zinc-400"
      ></p>

    </section>

    <section class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">

      <table class="w-full text-left">

        <thead class="bg-zinc-800 text-zinc-300">

          <tr>
            <th class="p-3">Producto</th>
            <th class="p-3">Anterior</th>
            <th class="p-3">Nueva</th>
            <th class="p-3">Diferencia</th>
            <th class="p-3">Motivo</th>
            <th class="p-3">Usuario</th>
          </tr>

        </thead>

        <tbody
          id="tablaAjustes"
          class="divide-y divide-zinc-800"
        ></tbody>

      </table>

    </section>

  </main>

  <script src="./js/ajustes-inventario.js"></script>

</body>
</html>
