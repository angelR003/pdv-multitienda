<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Entradas - Las Gardenias</title>
  <link rel="icon" type="image/png" href="./assets/gardenia.png">
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="bg-zinc-950 text-white min-h-screen">

  <main class="max-w-5xl mx-auto p-6">

    <header class="flex items-center justify-between mb-8">

      <div class="flex items-center gap-4">

        <a
          href="./dashboard.html"
          class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-sm"
        >
          ← Menú
        </a>

        <div>
          <h1 class="text-4xl font-black">
            Entradas de mercancía
          </h1>

          <p class="text-zinc-400 mt-2">
            Registrar mercancía nueva en inventario.
          </p>
        </div>

      </div>

    </header>

    <section class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<div>
  <label class="block text-sm text-zinc-400 mb-2">
    Producto
  </label>

  <input id="buscarProductoEntrada" type="text" placeholder="Buscar producto..."
    class="w-full mb-2 rounded-xl bg-zinc-950 border border-zinc-700 px-4 py-3 text-white placeholder-zinc-500" />

  <select id="producto" class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"></select>
        </div>

        <div>
          <label class="block text-sm text-zinc-400 mb-2">
            Cantidad
          </label>

          <input
            id="cantidad"
            type="number"
            step="0.001"
            class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
            placeholder="Cantidad..."
          />
        </div>

        <div id="grupoPiezasSueltas" class="hidden">
          <label id="labelPiezasSueltas" class="block text-sm text-zinc-400 mb-2">
            Piezas sueltas
          </label>

          <input
            id="piezasSueltas"
            type="number"
            min="0"
            step="1"
            class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
            placeholder="Ejemplo: 5"
          />
        </div>

        <div>
          <label class="block text-sm text-zinc-400 mb-2">
            Proveedor
          </label>

          <input
            id="proveedor"
            type="text"
            class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
            placeholder="Proveedor..."
          />
        </div>

        <div>
          <label class="block text-sm text-zinc-400 mb-2">
            Costo unitario
          </label>

          <input
            id="costoUnitario"
            type="number"
            step="0.01"
            class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
            placeholder="Costo..."
          />
        </div>

      </div>

      <div class="mt-5">
        <label class="block text-sm text-zinc-400 mb-2">
          Observaciones
        </label>

        <textarea
          id="observaciones"
          class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
          rows="4"
          placeholder="Observaciones..."
        ></textarea>
      </div>

      <button
        type="button"
        id="btnRegistrar"
        class="mt-8 w-full bg-purple-500 hover:bg-purple-400 text-black font-black py-4 rounded-xl text-xl"
      >
        Registrar entrada
      </button>

      <p
        id="mensaje"
        class="mt-5 text-sm text-zinc-400"
      ></p>

    </section>

  </main>

  <script src="./js/entradas.js"></script>

</body>
</html>
