<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Movimientos de Caja - Las Gardenias</title>
  <link rel="stylesheet" href="./css/styles.css" />

   

  <link rel="icon" type="image/png" href="./assets/gardenia.png">
</head>

<body class="bg-zinc-950 text-white min-h-screen">

  <main class="max-w-6xl mx-auto p-6">

    <header class="flex items-center justify-between mb-8">

      <div class="flex items-center gap-4">

        <a
          href="./dashboard.html"
          class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-sm"
        >
          ← Menú
        </a>

        <div>
          <h1 class="text-4xl font-black">
            Movimientos de caja
          </h1>

          <p class="text-zinc-400 mt-2">
            Entradas y salidas de dinero.
          </p>
        </div>

      </div>

    </header>

    <section class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 mb-8">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <div>
          <label class="block text-sm text-zinc-400 mb-2">
            Tipo de movimiento
          </label>

          <select
            id="tipoMovimiento"
            class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
          >
            <option value="fondo_inicial">Fondo inicial</option>
            <option value="entrada_dinero">Entrada de dinero</option>
            <option value="salida_dinero">Salida de dinero</option>
            <option value="pago_proveedor">Pago a proveedor</option>
            <option value="retiro">Retiro</option>
            <option value="ajuste">Ajuste</option>
          </select>
        </div>

        <div>
          <label class="block text-sm text-zinc-400 mb-2">
            Monto
          </label>

          <input
            id="monto"
            type="number"
            step="0.01"
            class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
            placeholder="Monto..."
          />
        </div>

      </div>

      <div class="mt-5">
        <label class="block text-sm text-zinc-400 mb-2">
          Concepto
        </label>

        <input
          id="concepto"
          type="text"
          class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
          placeholder="Ejemplo: Pago Coca-Cola"
        />
      </div>

      <div class="mt-5">
        <label class="block text-sm text-zinc-400 mb-2">
          Observaciones
        </label>

        <textarea
          id="observaciones"
          rows="4"
          class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
          placeholder="Observaciones..."
        ></textarea>
      </div>

      <button
        type="button"
        id="btnRegistrar"
        class="mt-8 w-full bg-green-500 hover:bg-green-400 text-black font-black py-4 rounded-xl text-xl"
      >
        Registrar movimiento
      </button>

      <p
        id="mensaje"
        class="mt-5 text-sm text-zinc-400"
      ></p>

    </section>

    <section class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">

      <table class="w-full text-left">

        <thead class="bg-zinc-800 text-zinc-300">

          <tr>
            <th class="p-3">Tipo</th>
            <th class="p-3">Monto</th>
            <th class="p-3">Concepto</th>
            <th class="p-3">Usuario</th>
            <th class="p-3">Fecha</th>
          </tr>

        </thead>

        <tbody
          id="tablaMovimientos"
          class="divide-y divide-zinc-800"
        ></tbody>

      </table>

    </section>

  </main>

  <script src="./js/session.js?v=20260607"></script>
  <script src="./js/movimientos-caja.js"></script>

</body>
</html>
