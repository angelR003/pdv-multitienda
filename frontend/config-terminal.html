<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Configurar terminal</title>
  <link rel="stylesheet" href="./css/styles.css">

</head>

<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-3xl p-8">

    <h1 class="text-4xl font-black mb-3">
      Configurar terminal
    </h1>

    <p class="text-zinc-400 mb-8">
      Esta computadora quedará asignada a una sucursal.
    </p>

    <label class="block text-sm text-zinc-400 mb-2">
      Sucursal
    </label>

    <select
      id="tienda"
      class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 mb-8"
    >
      <option value="1">
        Las Gardenias 
      </option>

      <option value="2">
        Las Gardenias 2
      </option>

      <option value="3">
        Los Angeles
      </option>
    </select>

    <button
      id="btnGuardar"
      class="w-full bg-indigo-500 hover:bg-indigo-400 text-black font-black py-4 rounded-xl text-xl"
    >
      Guardar configuración
    </button>

    <p
      id="mensaje"
      class="mt-5 text-sm text-zinc-400"
    ></p>

  </div>

  <script src="./js/config-terminal.js"></script>

</body>
</html>
