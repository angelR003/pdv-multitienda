<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fiados - Las Gardenias</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="bg-zinc-950 text-white min-h-screen">
  <main class="max-w-7xl mx-auto p-6">

    <header class="flex items-center gap-4 mb-8">
      <a href="./dashboard.html" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-sm">
        ← Menú
      </a>

      <div>
        <h1 class="text-4xl font-black">Fiados</h1>
        <p class="text-zinc-400 mt-2">Clientes, deudas, límites y abonos.</p>
      </div>
    </header>

    <section class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 mb-8">
      <h2 class="text-2xl font-black mb-5">Nuevo deudor</h2>

      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <input id="nombreCompleto" class="bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3" placeholder="Nombre completo *">
        <input id="apodo" class="bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3" placeholder="Apodo">
        <input id="telefono" class="bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3" placeholder="Teléfono">
        <input id="limiteCredito" type="number" class="bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3" placeholder="Límite crédito">
      </div>

      <button id="btnCrearCliente" class="mt-5 bg-lime-500 hover:bg-lime-400 text-black px-6 py-3 rounded-xl font-black">
        Crear deudor
      </button>

      <p id="mensaje" class="mt-4 text-sm text-zinc-400"></p>
    </section>

    <section>
      <h2 class="text-2xl font-black mb-5">Clientes</h2>
      <div id="contenedorClientes" class="grid grid-cols-1 md:grid-cols-3 gap-5"></div>
    </section>

    <section id="detalleCliente" class="hidden mt-8 bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
      <h2 id="detalleTitulo" class="text-3xl font-black mb-2"></h2>
      <p id="detalleInfo" class="text-zinc-400 mb-6"></p>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-zinc-950 border border-zinc-800 rounded-2xl p-5">
          <h3 class="text-xl font-black mb-4">Agregar deuda</h3>

          <input id="conceptoFiado" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 mb-3" placeholder="¿De qué es la deuda? Ej. Coca, pan, cigarros">
          <input id="montoFiado" type="number" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 mb-3" placeholder="Monto">

          <button id="btnRegistrarFiado" class="w-full bg-red-500 hover:bg-red-400 text-black py-3 rounded-xl font-black">
            Registrar deuda
          </button>
        </div>

        <div class="bg-zinc-950 border border-zinc-800 rounded-2xl p-5">
          <h3 class="text-xl font-black mb-4">Registrar abono</h3>

          <input id="montoAbono" type="number" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 mb-3" placeholder="Monto abonado">
          <input id="observacionesAbono" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 mb-3" placeholder="Observaciones">

          <button id="btnRegistrarAbono" class="w-full bg-green-500 hover:bg-green-400 text-black py-3 rounded-xl font-black">
            Registrar abono
          </button>
        </div>
      </div>

      <h3 class="text-xl font-black mt-8 mb-4">Historial</h3>
      <div class="overflow-hidden rounded-2xl border border-zinc-800">
        <table class="w-full text-left">
          <thead class="bg-zinc-800 text-zinc-300">
            <tr>
              <th class="p-3">Tipo</th>
              <th class="p-3">Concepto</th>
              <th class="p-3">Monto</th>
              <th class="p-3">Usuario</th>
              <th class="p-3">Fecha</th>
            </tr>
          </thead>
          <tbody id="tablaHistorial" class="divide-y divide-zinc-800"></tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="./js/fiados.js"></script>
</body>
</html>
