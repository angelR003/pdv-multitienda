<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Promociones - Las Gardenias</title>

  <link rel="stylesheet" href="./css/styles.css">
  <link rel="icon" type="image/png" href="./assets/gardenia.png">
</head>

<body class="bg-zinc-950 text-white min-h-screen">

  <main class="max-w-6xl mx-auto p-6">

    <header class="flex items-center gap-4 mb-8">
      <a
        href="./dashboard.html"
        class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-sm"
      >
        ← Menú
      </a>

      <div>
        <h1 class="text-4xl font-black">
          Promociones
        </h1>

        <p class="text-zinc-400 mt-2">
          Configura una o varias promociones por cantidad.
        </p>
      </div>
    </header>

    <section class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 mb-8">
      <h2 class="text-2xl font-black mb-5">
        Nueva promoción
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
        <div class="relative">
          <label class="block text-sm text-zinc-400 mb-2">
            Producto
          </label>

          <input
            id="buscarProductoPromocion"
            type="text"
            class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 outline-none focus:border-white"
            placeholder="Buscar por nombre, marca, categoria o codigo..."
          />

          <div
            id="resultadosProductoPromocion"
            class="hidden absolute z-40 mt-2 max-h-80 w-full overflow-y-auto rounded-2xl border border-zinc-700 bg-zinc-950 shadow-2xl"
          ></div>

          <select
            id="productoPromocion"
            class="hidden"
          >
            <option value="">Cargando productos...</option>
          </select>
        </div>

        <div>
          <label class="block text-sm text-zinc-400 mb-2">
            Cantidad requerida
          </label>

          <input
            id="cantidadRequerida"
            type="number"
            min="2"
            step="1"
            class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
            placeholder="Ejemplo: 2"
          />
        </div>

        <div>
          <label class="block text-sm text-zinc-400 mb-2">
            Precio promoción
          </label>

          <input
            id="precioPromocion"
            type="number"
            min="0.01"
            step="0.01"
            class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
            placeholder="Ejemplo: 35"
          />
        </div>
      </div>

      <button
        type="button"
        id="btnGuardarPromocion"
        class="mt-6 w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-4 rounded-xl text-xl"
      >
        Guardar promoción
      </button>

      <p
        id="mensaje"
        class="mt-5 text-sm text-zinc-400"
      ></p>
    </section>

    <section class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
      <div class="p-6 border-b border-zinc-800">
        <h2 class="text-2xl font-black">
          Promociones registradas
        </h2>

        <p class="text-zinc-400 mt-2">
          Puedes tener varias promociones activas para el mismo producto si la cantidad es diferente.
        </p>
      </div>

      <table class="w-full text-left">
        <thead class="bg-zinc-800 text-zinc-300">
          <tr>
            <th class="p-3">Producto</th>
            <th class="p-3">Precio normal</th>
            <th class="p-3">Promoción</th>
            <th class="p-3">Estado</th>
            <th class="p-3">Fecha</th>
            <th class="p-3"></th>
          </tr>
        </thead>

        <tbody
          id="tablaPromociones"
          class="divide-y divide-zinc-800"
        ></tbody>
      </table>
    </section>

  </main>

  <script src="./js/session.js?v=20260715"></script>
  <script src="./js/promociones.js"></script>

</body>
</html>
