<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventario - Las Gardenias</title>
   
  <link rel="icon" type="image/png" href="./assets/gardenia.png">
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body class="bg-zinc-950 text-white min-h-screen">
  <main class="max-w-7xl mx-auto p-6">
    <header class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-4">
        <a
          href="./dashboard.html"
          class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-sm"
        >
          ← Menú
        </a>

        <div>
          <h1 class="text-4xl font-black">Inventario</h1>
          <p class="text-zinc-400 mt-2">Existencias actuales por tienda.</p>
        </div>
      </div>
    </header>

    <section class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
      <div class="flex flex-col md:flex-row gap-4 mb-6">
        <input
          id="buscador"
          type="text"
          class="flex-1 bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 outline-none focus:border-yellow-400"
          placeholder="Buscar producto..."
        />

        <select
          id="filtroEstado"
          class="bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 outline-none focus:border-yellow-400"
        >
          <option value="todos">Todos</option>
          <option value="bajo">Bajo mínimo</option>
          <option value="ok">OK</option>
        </select>
      </div>

      <div class="overflow-hidden rounded-2xl border border-zinc-800">
        <table class="w-full text-left">
          <thead class="bg-zinc-800 text-zinc-300">
            <tr>
              <th class="p-3">Producto</th>
              <th class="p-3">Tipo</th>
              <th class="p-3">Existencia</th>
              <th class="p-3">Mínimo</th>
              <th class="p-3">Máximo</th>
              <th class="p-3">Estado</th>
              <th class="p-3"></th>
            </tr>
          </thead>

          <tbody id="tablaInventario" class="divide-y divide-zinc-800"></tbody>
        </table>
      </div>

      <p id="mensaje" class="mt-5 text-sm text-zinc-400"></p>
    </section>
  </main>

  <div
  id="modalLimites"
  class="fixed inset-0 bg-black/70 hidden items-center justify-center p-4"
>
  <div class="bg-zinc-900 border border-zinc-800 rounded-2xl w-full max-w-md p-6">
    <h2 class="text-2xl font-black mb-2">
      Editar límites
    </h2>

    <p
      id="limitesProducto"
      class="text-zinc-400 mb-5"
    ></p>

    <label class="block text-sm text-zinc-400 mb-2">
      Mínimo
    </label>

    <input
      id="limiteMinimo"
      type="number"
      step="0.001"
      class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 mb-4"
    />

    <label class="block text-sm text-zinc-400 mb-2">
      Máximo
    </label>

    <input
      id="limiteMaximo"
      type="number"
      step="0.001"
      class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 mb-5"
    />

    <div class="flex gap-3">
      <button
        type="button"
        id="btnGuardarLimites"
        class="flex-1 bg-yellow-500 hover:bg-yellow-400 text-black font-black rounded-xl py-3"
      >
        Guardar
      </button>

      <button
        type="button"
        id="btnCerrarLimites"
        class="flex-1 bg-zinc-800 hover:bg-zinc-700 rounded-xl py-3"
      >
        Cancelar
      </button>
    </div>
  </div>
</div>

  <script src="./js/session.js?v=20260607"></script>
  <script src="./js/inventario.js"></script>
</body>
</html>
