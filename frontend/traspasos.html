<!doctype html>
<html lang="es">
  <head>
    <link rel="icon" type="image/x-icon" href="./assets/gardenia.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traspasos - PDV Las Gardenias</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body class="bg-zinc-950 text-white min-h-screen">
    <main class="max-w-7xl mx-auto p-6">
      <header class="flex items-center justify-between gap-4 mb-8">
        <div>
          <h1 class="text-4xl font-black">Traspasos</h1>
          <p class="text-zinc-400 mt-2">
            Movimientos de mercancía entre tiendas.
          </p>
        </div>

        <a
          href="./dashboard.html"
          class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl"
        >
          Volver al menú
        </a>
      </header>

      <section
        id="panelCrearTraspaso"
        class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 mb-8"
      >
        <h2 class="text-2xl font-black mb-5">Nuevo traspaso</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm text-zinc-400 mb-2">
              Tienda origen
            </label>

            <select
              id="tiendaOrigen"
              class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
            ></select>
          </div>

          <div>
            <label class="block text-sm text-zinc-400 mb-2">
              Tienda destino
            </label>

            <select
              id="tiendaDestino"
              class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
            ></select>
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm text-zinc-400 mb-2">
              Motivo / observaciones
            </label>

            <input
              id="motivoTraspaso"
              class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
              placeholder="Opcional..."
            />
          </div>
        </div>

        <div class="mt-6 grid grid-cols-1 md:grid-cols-[1fr_160px_auto] gap-4">
          <div class="relative">
            <label class="block text-sm text-zinc-400 mb-2">
              Producto
            </label>

            <input
              id="buscadorProductoTraspaso"
              class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
              placeholder="Buscar por nombre, marca, categoria o codigo..."
              autocomplete="off"
            />

            <div
              id="resultadosProductoTraspaso"
              class="hidden absolute z-30 mt-2 w-full max-h-80 overflow-y-auto rounded-2xl border border-zinc-700 bg-zinc-950 shadow-2xl"
            ></div>
          </div>

          <div>
            <label class="block text-sm text-zinc-400 mb-2">
              Cantidad
            </label>

            <input
              id="cantidadTraspaso"
              type="number"
              step="0.001"
              class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
              placeholder="0"
            />
          </div>

          <div class="flex items-end">
            <button
              type="button"
              id="btnAgregarProducto"
              class="w-full bg-blue-500 hover:bg-blue-400 text-black font-bold rounded-xl px-5 py-3"
            >
              Agregar
            </button>
          </div>
        </div>

        <div class="mt-6 overflow-hidden rounded-xl border border-zinc-800">
          <table class="w-full text-left">
            <thead class="bg-zinc-800 text-zinc-300">
              <tr>
                <th class="p-3">Producto</th>
                <th class="p-3">Disponible</th>
                <th class="p-3">Cantidad</th>
                <th class="p-3"></th>
              </tr>
            </thead>

            <tbody id="tablaProductosTraspaso" class="divide-y divide-zinc-800">
            </tbody>
          </table>
        </div>

        <button
          type="button"
          id="btnEnviarTraspaso"
          class="mt-6 w-full bg-green-500 hover:bg-green-400 text-black font-black rounded-xl py-4 text-xl"
        >
          Enviar traspaso
        </button>
      </section>

      <section class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
        <div class="p-6 border-b border-zinc-800 flex items-center justify-between gap-4">
          <div>
            <h2 class="text-2xl font-black">Historial</h2>
            <p class="text-zinc-400 mt-1">Traspasos enviados y recibidos.</p>
          </div>

          <select
            id="filtroEstado"
            class="bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
          >
            <option value="">Todos</option>
            <option value="enviado">Enviados</option>
            <option value="recibido">Recibidos</option>
            <option value="cancelado">Cancelados</option>
          </select>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-zinc-800 text-zinc-300">
              <tr>
                <th class="p-3">Folio</th>
                <th class="p-3">Origen</th>
                <th class="p-3">Destino</th>
                <th class="p-3">Estado</th>
                <th class="p-3">Fecha</th>
                <th class="p-3"></th>
              </tr>
            </thead>

            <tbody id="tablaTraspasos" class="divide-y divide-zinc-800"></tbody>
          </table>
        </div>
      </section>

      <p id="mensaje" class="mt-5 text-sm text-zinc-400"></p>
    </main>

    <script src="./js/session.js?v=20260715"></script>
    <script src="./js/traspasos.js"></script>
  </body>
</html>
