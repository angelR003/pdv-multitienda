<!doctype html>
<html lang="es">
  <head>
      <link rel="icon" type="image/x-icon" href="./assets/gardenia.png">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Productos - PDV Las Gardenias</title>

    <link rel="stylesheet" href="./css/styles.css">
  </head>

  <body class="bg-zinc-950 text-white min-h-screen">
    <main class="max-w-5xl mx-auto p-6">
      <header class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-4xl font-bold">Productos</h1>

          <p class="text-zinc-400">Alta de productos</p>
        </div>

        <a
          href="./dashboard.html"
          class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl"
        >
          Volver al menu
        </a>
      </header>

      <section class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm text-zinc-400 mb-2">
              Tipo de producto
            </label>

            <select
              id="tipoProducto"
              class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
            >
              <option value="codigo_barras">Código de barras</option>

              <option value="peso_variable">Peso variable</option>

              <option value="manual">Manual</option>
            </select>
          </div>

          <div>
            <label class="block text-sm text-zinc-400 mb-2">
              Código de barras
            </label>

            <input
              id="codigoBarras"
              type="text"
              class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
              placeholder="Código..."
            />
          </div>

          <div>
            <label class="block text-sm text-zinc-400 mb-2"> Nombre </label>

            <input
              id="nombre"
              type="text"
              class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
              placeholder="Nombre..."
            />
          </div>

          <div>
            <label class="block text-sm text-zinc-400 mb-2"> Categoría </label>

            <select
  id="categoria"
  class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
>
  <option value="">Selecciona categoría...</option>
  <option value="Abarrotes básicos">Abarrotes básicos</option>
  <option value="Refrescos y bebidas">Refrescos y bebidas</option>
  <option value="Cervezas">Cervezas</option>
  <option value="Lácteos">Lácteos</option>
  <option value="Embutidos y refrigerados">Embutidos y refrigerados</option>
  <option value="Botanas">Botanas</option>
  <option value="Galletas y pan dulce">Galletas y pan dulce</option>
  <option value="Dulces y chocolates">Dulces y chocolates</option>
  <option value="Huevo y granel">Huevo y granel</option>
  <option value="Limpieza del hogar">Limpieza del hogar</option>
  <option value="Higiene personal">Higiene personal</option>
  <option value="Desechables">Desechables</option>
  <option value="Mascotas">Mascotas</option>
  <option value="Farmacia básica">Farmacia básica</option>
  <option value="Condimentos y salsas">Condimentos y salsas</option>
  <option value="Café, té y chocolate">Café, té y chocolate</option>
  <option value="Helados y congelados">Helados y congelados</option>
  <option value="Cigarros">Cigarros</option>
  <option value="Recargas y servicios">Recargas y servicios</option>
  <option value="Envases">Envases</option>
  <option value="Otros">Otros</option>
</select>
          </div>

          <div>
            <label class="block text-sm text-zinc-400 mb-2"> Marca </label>

            <input
              id="marca"
              type="text"
              class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
              placeholder="Marca..."
            />
          </div>

          <div>
            <label class="block text-sm text-zinc-400 mb-2">
              Presentación
            </label>

            <input
              id="presentacion"
              type="text"
              class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
              placeholder="Presentación..."
            />
          </div>

          <div>
            <label class="block text-sm text-zinc-400 mb-2"> Unidad </label>
            <select
              id="unidad"
              class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
            >
              <option value="pieza">Pieza</option>
              <option value="kg">Kilogramo</option>
              <option value="litro">Litro</option>
              <option value="paquete">Paquete</option>
              <option value="caja">Caja</option>
              <option value="bolsa">Bolsa</option>
              <option value="botella">Botella</option>
              <option value="lata">Lata</option>
              <option value="otro">Otro</option>
            </select>
          </div>

          <div>
            <label class="block text-sm text-zinc-400 mb-2"> Precio </label>

            <input
              id="precio"
              type="number"
              step="0.01"
              class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
              placeholder="Precio..."
            />
          </div>

          <div>
            <label class="block text-sm text-zinc-400 mb-2">
              Costo compra
            </label>

            <input
              id="costoCompra"
              type="number"
              step="0.01"
              class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
              placeholder="Costo..."
            />
          </div>

          <div class="flex items-center gap-3 mt-8">
            <input id="requiereCaducidad" type="checkbox" />

            <label class="text-sm text-zinc-300"> Requiere caducidad </label>
          </div>
          <div class="md:col-span-2 mt-4 border border-zinc-800 rounded-2xl p-4">
  <label class="flex items-center gap-3 font-bold">
    <input id="esDerivado" type="checkbox" class="w-4 h-4">
    Producto suelto / derivado
  </label>

  <p class="text-zinc-500 text-sm mt-2">
    Úsalo para cigarros sueltos, pilas sueltas, rollos de papel, cerillos, etc.
  </p>

  <div id="grupoDerivado" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
    <div>
      <label class="block text-sm text-zinc-400 mb-2">
        Producto padre
      </label>

      <select
        id="productoPadre"
        class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
      >
        <option value="">Selecciona producto padre...</option>
      </select>
    </div>

    <div>
      <label class="block text-sm text-zinc-400 mb-2">
        Unidades sueltas por paquete
      </label>

      <input
        id="unidadesPorPadre"
        type="number"
        min="1"
        step="1"
        class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3"
        placeholder="Ejemplo: 20 cigarros por cajetilla"
      />
    </div>
  </div>
</div>
        </div>

        <button
          type="button"
          id="btnGuardar"
          class="mt-8 w-full bg-green-500 hover:bg-green-400 text-black font-bold py-4 rounded-xl text-xl"
        >
          Guardar producto
        </button>

        <p id="mensaje" class="mt-5 text-sm text-zinc-400"></p>
      </section>
      <section class="mt-10 bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">

  <div class="p-6 border-b border-zinc-800">

    <input
  id="buscarProducto"
  type="text"
  placeholder="Buscar por nombre, código, categoría o marca..."
  class="w-full mb-4 rounded-xl bg-zinc-950 border border-zinc-700 px-4 py-3 text-white placeholder-zinc-500"
/>

    <h2 class="text-3xl font-black">
      Productos registrados
    </h2>

    <p class="text-zinc-400 mt-2">
      Editar productos existentes.
    </p>

  </div>

  <div class="overflow-x-auto">

    <table class="w-full text-left">

      <thead class="bg-zinc-800 text-zinc-300">

        <tr>
          <th class="p-3">Producto</th>
          <th class="p-3">Tipo</th>
          <th class="p-3">Precio</th>
          <th class="p-3">Costo</th>
          <th class="p-3">Unidad</th>
          <th class="p-3"></th>
        </tr>

      </thead>

      <tbody
        id="tablaProductos"
        class="divide-y divide-zinc-800"
      ></tbody>

    </table>

  </div>

</section>
    </main>

    <script src="./js/productos.js"></script>
  </body>
</html>
